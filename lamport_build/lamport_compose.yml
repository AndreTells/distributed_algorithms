services:
  server:
    image: lamport_server:latest
    tty: true 

    networks:
      lamport_network:
        ipv4_address: 172.16.238.11
    
  client:
    image: lamport_client:latest
    tty: true 
    environment:
      - SERVER_IP=172.16.238.11

    networks:
      lamport_network:
        ipv4_address: 172.16.238.10

    depends_on:
      - server

networks:
  lamport_network:
    ipam:
      driver: default
      config:
        - subnet: "172.16.238.0/24"
